<header class="site-header">
    <div class="container site-header__inner">
        <a class="brand" href="/">
            <span class="brand__mark">
                <img src="{freezed:resource(path: 'assets/images/logo.svg', context: 'theme')}" alt="" width="26" height="26">
            </span>
            <span>{siteName}</span>
        </a>

        <nav class="nav" aria-label="Main navigation">
            <div class="nav__links">
                <f:for each="{navigation}" as="item">
                    <a class="nav__link" href="{item.url}">{item.label}</a>
                </f:for>
            </div>

            <button class="theme-toggle" type="button" aria-label="Toggle color theme">
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            </button>

            <button class="nav-toggle" type="button" aria-label="Toggle navigation">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
            </button>
        </nav>
    </div>
</header>
